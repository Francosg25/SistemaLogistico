# ═══════════════════════════════════════════════════════════════
# CONFIG.YAML — Fuente única de verdad del sistema
# ═══════════════════════════════════════════════════════════════
aplicacion:
  nombre: "Consolidación Logística"
  version: "2.0.0"
  idioma: "es-MX"

# ────────────────────────────────────────────────────────────
# COSTOS FIJOS POR OPERACIÓN (USD)
# ────────────────────────────────────────────────────────────
costos:
  sea:
    valor: 2500
    unidad: "Container"
    moneda: "USD"
  land:
    valor: 1200
    unidad: "Reference"
    moneda: "USD"
  outbound:
    valor: 1500
    unidad: "Waybill"
    moneda: "USD"

# ────────────────────────────────────────────────────────────
# TOLERANCIAS DE VALIDACIÓN (críticas)
# ────────────────────────────────────────────────────────────
validaciones:
  tolerancia_costo: 0.01      # USD - diferencia máxima por grupo
  tolerancia_pct: 0.0001      # 0.01% - suma de porcentajes
  decimales_monto: 2
  decimales_pct: 4
  bloquear_export_si_error: true   # 🔴 si hay ERROR, NO permite descargar

# ────────────────────────────────────────────────────────────
# DETECCIÓN AUTOMÁTICA DE TIPO DE ARCHIVO
# ────────────────────────────────────────────────────────────
deteccion:
  outbound:
    keywords_obligatorias: ["Waybill", "Pallets", "Cartons"]
    keywords_opcionales: ["Invoice", "SAT", "Customer"]
    score_minimo: 15
  sea:
    keywords_obligatorias: ["Container", "Subinventory", "Item Code"]
    keywords_opcionales: ["Total Gross Weight"]
    score_minimo: 12
  land:
    keywords_obligatorias: ["Referencia", "Caja", "No. Parte"]
    keywords_opcionales: ["Bultos", "Aduana", "Pedimento"]
    score_minimo: 10

# ────────────────────────────────────────────────────────────
# HOJAS A IGNORAR (en cualquier archivo)
# ────────────────────────────────────────────────────────────
hojas_ignoradas:
  - "Sheet2"
  - "Sheet3"
  - "XDO_METADATA"
  - "Hoja2"
  - "Hoja3"
  - "Instructivo"
  - "Notas"

# ────────────────────────────────────────────────────────────
# REGLA MISCELANEUS (palabras clave para reasignación)
# ────────────────────────────────────────────────────────────
miscelaneus:
  bu_destino: "Miscelaneus"
  # Palabras que SIEMPRE reasignan (sin importar guion)
  palabras_sin_filtro:
    - "PLASTIC"
    - "PLASTICA"
    - "PLASTICAS"
    - "CHAROLA"
    - "CHAROLAS"
  # Palabras que SOLO reasignan si NO tienen guion antes (parte de SKU)
  palabras_con_filtro_guion:
    - "TAPA"
    - "BASE"
    - "CAJA"
    - "CAJAS"

# ────────────────────────────────────────────────────────────
# BUS ESPECIALES (no participan en %PCT de Sea)
# ────────────────────────────────────────────────────────────
bus_especiales:
  excluidos_pct_sea:
    - "Capex"
    - "MCS"
  marcadores_problema:
    - "SIN_BU"
    - "AMBIGUO"

# ────────────────────────────────────────────────────────────
# DETECCIÓN DE BU EN OUTBOUND (extracción del Reference)
# ────────────────────────────────────────────────────────────
outbound_bu:
  # Patrón regex para extraer BU del Reference
  # Ej: FG-R-2209LE26.M46/M45 → captura M46 y M45
  patron_regex: "M\\d{2}"
  # Si hay múltiples BUs separados por /, usar EL ÚLTIMO
  usar_ultimo_si_multiple: true

# ────────────────────────────────────────────────────────────
# RUTAS DE ARCHIVOS DE DATOS
# ────────────────────────────────────────────────────────────
rutas:
  maestro_bu_sea: "src/config/maestro_bu_sea.json"
  catalogo_bu: "src/config/bu_catalog.json"
  logs: "logs/app.log"

# ────────────────────────────────────────────────────────────
# LOGGING
# ────────────────────────────────────────────────────────────
logging:
  nivel: "INFO"
  archivo: "./logs/app.log"
  formato: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  rotacion_mb: 10
  backup_count: 5